# Define when this runs

name: Testing our code
on:
  workflow_dispatch:
  push:
    branches:
      - main

# What does this do
jobs:
  test:
    name: Running our pytests
    runs-on: ubuntu-latest
    steps:
      # Clone the repo into the virtual machine
      - name: Checkout repository
        uses: actions/checkout@v3
      # install python on our virtual machine
      - name: Install python
        uses: actions/setup-python@v6
      # install pytest
      - name: Install pytest
        run: pip install pytest
      # run pytest
      - name: Run tests
        run: pytest test_main.py